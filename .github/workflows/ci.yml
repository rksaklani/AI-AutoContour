name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    name: Backend (lint + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend (test deps only)
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install fastapi "sqlalchemy>=2.0" "pydantic>=2.6" pydantic-settings \
            "python-jose[cryptography]" "passlib[bcrypt]" "bcrypt<4.1" python-multipart pydicom jinja2 \
            celery redis boto3 httpx pytest pytest-asyncio email-validator "psycopg[binary]" ruff

      - name: Ruff lint
        working-directory: backend
        run: ruff check .

      - name: Pytest (includes pipeline smoke test)
        working-directory: backend
        env:
          SECRET_KEY: ci-secret
        run: pytest -q

  frontend:
    name: Frontend (typecheck + lint + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm install

      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build

  docker:
    name: Docker images build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f infra/backend.Dockerfile -t lumira-backend:ci .

      - name: Build frontend image
        run: docker build -f infra/frontend.Dockerfile -t lumira-frontend:ci .
